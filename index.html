<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostByte by ItsZappoTV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', Arial, sans-serif;
        }
        body {
            background: #060b16;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* Moderner, großflächiger Hintergrund-Leuchteffekt */
        .bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 210, 255, 0.18), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(140, 0, 255, 0.15), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(6, 11, 22, 1), transparent 100%);
        }
        /* Größere, edlere Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            width: 520px;
            max-width: 90%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
        }
        .dev-badge {
            display: inline-block;
            background: rgba(76, 201, 255, 0.08);
            border: 1px solid rgba(76, 201, 255, 0.25);
            color: #4cc9ff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 40%, #a5c7f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #798394;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            color: #060b16;
            background: linear-gradient(90deg, #00d2ff, #0096ff);
            box-shadow: 0 8px 30px rgba(0, 210, 255, 0.35);
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 210, 255, 0.55);
            filter: brightness(1.1);
        }
        .status-text {
            margin-top: 30px;
            font-size: 14px;
            color: #8a96a8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d2ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Automatischer Download-Start nach 1 Sekunde
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "./frostbyte.jar";
            }, 1000);
        };
    </script>
</head>
<body>

    <div class="bg"></div>

    <div class="card">
        <div class="dev-badge">
            <i class="fa-solid fa-code" style="margin-right: 6px;"></i> entwickelt von ItsZappoTV
        </div>
        
        <h1>FrostByte</h1>
        <div class="subtitle">Offizieller Client & Tool Release</div>

        <a class="download-btn" href="./frostbyte.jar" download="frostbyte.jar">
            <i class="fa-solid fa-cloud-arrow-down"></i> Jetzt herunterladen
        </a>

        <div class="status-text">
            <div class="spinner"></div>
            Download startet automatisch...
        </div>
    </div>

</body>
</html>
